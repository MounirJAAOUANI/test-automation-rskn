name: Build Flutter

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Nom de l'application (ex: WealthFlow)"
        required: true
        type: string
      package_id:
        description: "Package ID complet (ex: com.appfactory.wealthflow)"
        required: true
        type: string
      primary_color:
        description: "Couleur hex — avec ou sans # (ex: 7C3AED ou #7C3AED)"
        required: false
        type: string
        default: "7C3AED"

jobs:
  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter stable ─────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"
          cache: true

      # ── 4. Préparer les variables ─────────────────────────────────────────
      - name: Prepare variables
        run: |
          DART_NAME=$(echo "${{ inputs.app_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '_' \
            | sed 's/[^a-z0-9_]//g')

          COLOR_HEX=$(echo "${{ inputs.primary_color }}" | sed 's/#//g')

          PACKAGE_ORG=$(echo "${{ inputs.package_id }}" | rev | cut -d'.' -f2- | rev)
          PACKAGE_APP=$(echo "${{ inputs.package_id }}" | rev | cut -d'.' -f1 | rev)

          echo "DART_NAME=$DART_NAME"         >> $GITHUB_ENV
          echo "COLOR_HEX=$COLOR_HEX"         >> $GITHUB_ENV
          echo "PACKAGE_ORG=$PACKAGE_ORG"     >> $GITHUB_ENV
          echo "PACKAGE_APP=$PACKAGE_APP"     >> $GITHUB_ENV

      # ── 5-13: Build steps (unchanged) ───────────────────────────────────

      # ── 5. Générer un projet Flutter propre ───────────────────────────────
      - name: Generate clean Flutter project
        run: |
          echo "▶ Generating Flutter project..."
          flutter create \
            --org "$PACKAGE_ORG" \
            --project-name "$DART_NAME" \
            --platforms android \
            /tmp/flutter_gen
          echo "✅ Flutter project generated"

      # ── 6. Copier les fichiers Android ────────────────────────────────────
      - name: Copy Android platform files
        run: |
          rm -rf android
          cp -r /tmp/flutter_gen/android ./android
          echo "✅ Android v2 files copied"

      # ── 7. Injecter pubspec.yaml ──────────────────────────────────────────
      - name: Inject pubspec.yaml
        run: |
          cat > pubspec.yaml << EOF
          name: ${DART_NAME}
          description: ${{ inputs.app_name }} — Built with App Factory
          version: 1.0.0+1
          publish_to: 'none'

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8

          dev_dependencies:
            flutter_test:
              sdk: flutter

          flutter:
            uses-material-design: true
          EOF

      # ── 8. Injecter lib/main.dart ─────────────────────────────────────────
      - name: Inject lib/main.dart
        run: |
          mkdir -p lib
          cat > lib/main.dart << DARTEOF
          import 'package:flutter/material.dart';

          void main() {
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ inputs.app_name }}',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(
                    seedColor: const Color(0xFF${COLOR_HEX}),
                  ),
                  useMaterial3: true,
                ),
                home: const HomePage(),
              );
            }
          }

          class HomePage extends StatelessWidget {
            const HomePage({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('${{ inputs.app_name }}'),
                  backgroundColor: const Color(0xFF${COLOR_HEX}),
                  foregroundColor: Colors.white,
                ),
                body: const Center(
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      Icon(Icons.rocket_launch, size: 64, color: Color(0xFF${COLOR_HEX})),
                      SizedBox(height: 16),
                      Text('${{ inputs.app_name }}', style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold)),
                      SizedBox(height: 8),
                      Text('Built with App Factory'),
                    ],
                  ),
                ),
              );
            }
          }
          DARTEOF

      # ── 9. flutter pub get ───────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 10. Build AAB release — OPTIMIZED ──────────────────────────────
      - name: Flutter build appbundle (optimized)
        run: |
          flutter build appbundle \
            --release \
            --target-platform android-arm64 \
            --shrink

      # ── 11. Build APK debug — OPTIMIZED ────────────────────────────────
      - name: Flutter build APK debug (optimized)
        run: |
          flutter build apk \
            --debug \
            --target-platform android-arm64 \
            --shrink

      # ── 12. Strip debug symbols ────────────────────────────────────────────
      - name: Strip debug symbols
        run: |
          find build/app/outputs/bundle/release -name "*.so" -exec strip {} \; 2>/dev/null || true
          find build/app/outputs/flutter-apk -name "*.so" -exec strip {} \; 2>/dev/null || true
          echo "✅ Debug symbols stripped"

      # ── 13. Get artifact sizes ─────────────────────────────────────────────
      - name: Get artifact sizes
        id: sizes
        run: |
          AAB_SIZE=$(du -h build/app/outputs/bundle/release/app-release.aab | cut -f1)
          APK_SIZE=$(du -h build/app/outputs/flutter-apk/app-debug.apk | cut -f1)
          echo "aab_size=$AAB_SIZE" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT

      # ── 14. Upload AAB artifact ────────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 1

      # ── 15. Upload APK artifact ────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1

      # ── 16. Build summary ──────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "✅ BUILD COMPLETED"
          echo "  App              : ${{ inputs.app_name }}"
          echo "  Package          : ${{ inputs.package_id }}"
          echo "  Color            : #${{ env.COLOR_HEX }}"
          echo "  AAB Size         : ${{ steps.sizes.outputs.aab_size }}"
          echo "  APK Size         : ${{ steps.sizes.outputs.apk_size }}"

      # ── 17. PUBLISH TO GOOGLE PLAY ─────────────────────────────────────────
      - name: Publish to Google Play
        if: success()
        continue-on-error: true
        run: |
          echo "🎯 Publishing to Google Play Internal Testing..."

          AAB_FILE="build/app/outputs/bundle/release/app-release.aab"

          if [ ! -f "$AAB_FILE" ]; then
            echo "❌ AAB file not found at $AAB_FILE"
            exit 1
          fi

          echo "📦 AAB file size: $(du -h $AAB_FILE | cut -f1)"

          # Webhook vers Railway
          curl -X POST "https://test-automation-rskn-production.up.railway.app/api/webhook/playstore" \
            -H "Content-Type: application/json" \
            -d "{
              \"action\": \"publish_to_playstore\",
              \"packageId\": \"${{ inputs.package_id }}\",
              \"appName\": \"${{ inputs.app_name }}\",
              \"primaryColor\": \"${{ env.COLOR_HEX }}\",
              \"aabSize\": \"${{ steps.sizes.outputs.aab_size }}\",
              \"apkSize\": \"${{ steps.sizes.outputs.apk_size }}\",
              \"githubRunId\": \"${{ github.run_id }}\",
              \"githubRunUrl\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            -v || echo "⚠️  Webhook notification failed"

          echo "✅ Google Play publish workflow completed"

      # ── 18. Notify Railway of completion ───────────────────────────────────
      - name: Notify Railway build complete
        if: always()
        run: |
          curl -X POST "https://test-automation-rskn-production.up.railway.app/api/webhook/github" \
            -H "Content-Type: application/json" \
            -d "{
              \"action\": \"workflow_run\",
              \"workflow_run\": {
                \"id\": ${{ github.run_id }},
                \"name\": \"${{ github.workflow }}\",
                \"status\": \"completed\",
                \"conclusion\": \"${{ job.conclusion }}\",
                \"app_name\": \"${{ inputs.app_name }}\",
                \"package_id\": \"${{ inputs.package_id }}\",
                \"primary_color\": \"${{ env.COLOR_HEX }}\",
                \"aab_size\": \"${{ steps.sizes.outputs.aab_size }}\",
                \"apk_size\": \"${{ steps.sizes.outputs.apk_size }}\",
                \"html_url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }
            }" \
            -v || echo "⚠️  Webhook failed"
