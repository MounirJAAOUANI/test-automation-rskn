name: Build Flutter

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Nom de l'application (ex: WealthFlow)"
        required: true
        type: string
      package_id:
        description: "Package ID complet (ex: com.appfactory.wealthflow)"
        required: true
        type: string
      primary_color:
        description: "Couleur hex — avec ou sans # (ex: 7C3AED ou #7C3AED)"
        required: false
        type: string
        default: "7C3AED"

jobs:
  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter stable ─────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"
          cache: true

      # ── 4. Préparer les variables ─────────────────────────────────────────
      - name: Prepare variables
        run: |
          DART_NAME=$(echo "${{ inputs.app_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '_' \
            | sed 's/[^a-z0-9_]//g')

          COLOR_HEX=$(echo "${{ inputs.primary_color }}" | sed 's/#//g')

          PACKAGE_ORG=$(echo "${{ inputs.package_id }}" | rev | cut -d'.' -f2- | rev)
          PACKAGE_APP=$(echo "${{ inputs.package_id }}" | rev | cut -d'.' -f1 | rev)

          echo "DART_NAME=$DART_NAME"         >> $GITHUB_ENV
          echo "COLOR_HEX=$COLOR_HEX"         >> $GITHUB_ENV
          echo "PACKAGE_ORG=$PACKAGE_ORG"     >> $GITHUB_ENV
          echo "PACKAGE_APP=$PACKAGE_APP"     >> $GITHUB_ENV

          echo "▶ Variables calculées :"
          echo "  DART_NAME   = $DART_NAME"
          echo "  COLOR_HEX   = $COLOR_HEX"
          echo "  PACKAGE_ORG = $PACKAGE_ORG"
          echo "  PACKAGE_APP = $PACKAGE_APP"

      # ── 5. Générer un projet Flutter propre ───────────────────────────────
      - name: Generate clean Flutter project
        run: |
          echo "▶ Generating Flutter project in /tmp/flutter_gen..."
          flutter create \
            --org "$PACKAGE_ORG" \
            --project-name "$DART_NAME" \
            --platforms android \
            /tmp/flutter_gen
          echo "✅ Flutter project generated"

      # ── 6. Copier les fichiers Android ────────────────────────────────────
      - name: Copy Android platform files
        run: |
          rm -rf android
          cp -r /tmp/flutter_gen/android ./android
          echo "✅ Android v2 files copied"

      # ── 7. Injecter pubspec.yaml ──────────────────────────────────────────
      - name: Inject pubspec.yaml
        run: |
          cat > pubspec.yaml << EOF
          name: ${DART_NAME}
          description: ${{ inputs.app_name }} — Built with App Factory
          version: 1.0.0+1
          publish_to: 'none'

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            shared_preferences: ^2.2.3

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0

          flutter:
            uses-material-design: true
          EOF
          echo "✅ pubspec.yaml injected"

      # ── 8. Injecter lib/main.dart ─────────────────────────────────────────
      - name: Inject lib/main.dart
        run: |
          mkdir -p lib

          cat > lib/main.dart << DARTEOF
          import 'package:flutter/material.dart';

          void main() {
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ inputs.app_name }}',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(
                    seedColor: const Color(0xFF${COLOR_HEX}),
                  ),
                  useMaterial3: true,
                ),
                home: const HomePage(),
              );
            }
          }

          class HomePage extends StatelessWidget {
            const HomePage({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('${{ inputs.app_name }}'),
                  backgroundColor: const Color(0xFF${COLOR_HEX}),
                  foregroundColor: Colors.white,
                ),
                body: const Center(
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      Icon(
                        Icons.rocket_launch,
                        size: 64,
                        color: Color(0xFF${COLOR_HEX}),
                      ),
                      SizedBox(height: 16),
                      Text(
                        '${{ inputs.app_name }}',
                        style: TextStyle(
                          fontSize: 24,
                          fontWeight: FontWeight.bold,
                        ),
                      ),
                      SizedBox(height: 8),
                      Text('Built with App Factory'),
                    ],
                  ),
                ),
              );
            }
          }
          DARTEOF

          echo "✅ lib/main.dart injected"

      # ── 9. Vérification structure ─────────────────────────────────────────
      - name: Verify project structure
        run: |
          echo "=== pubspec.yaml ==="
          cat pubspec.yaml
          echo ""
          echo "=== Couleurs dans main.dart ==="
          grep "Color" lib/main.dart || true

      # ── 10. flutter pub get ───────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 11. Build AAB release — SIZE OPTIMIZED ────────────────────────────
      - name: Flutter build appbundle (size optimized)
        run: |
          flutter build appbundle \
            --release \
            --target-platform android-arm64 \
            --shrink

      # ── 12. Build APK debug — SIZE OPTIMIZED ──────────────────────────────
      - name: Flutter build APK debug (size optimized)
        run: |
          flutter build apk \
            --debug \
            --target-platform android-arm64 \
            --shrink

      # ── 13. Strip debug symbols (size optimization) ────────────────────────
      - name: Strip debug symbols
        run: |
          echo "▶ Optimizing binary size..."

          # AAB optimization
          find build/app/outputs/bundle/release -name "*.so" -exec strip {} \; 2>/dev/null || true

          # APK optimization
          find build/app/outputs/flutter-apk -name "*.so" -exec strip {} \; 2>/dev/null || true

          echo "✅ Debug symbols stripped"

      # ── 14. Upload AAB ────────────────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 1

      # ── 15. Upload APK debug ──────────────────────────────────────────────
      - name: Upload APK debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 1

      # ── 16. Build summary ─────────────────────────────────────────────────
      - name: Build summary
        run: |
          AAB_SIZE=$(du -sh build/app/outputs/bundle/release/app-release.aab 2>/dev/null | cut -f1 || echo "N/A")
          APK_SIZE=$(du -sh build/app/outputs/flutter-apk/app-debug.apk       2>/dev/null | cut -f1 || echo "N/A")
          echo "✅ BUILD RÉUSSI & OPTIMISÉ"
          echo "  App      : ${{ inputs.app_name }}"
          echo "  Package  : ${{ inputs.package_id }}"
          echo "  Color    : #${COLOR_HEX}"
          echo "  AAB size : $AAB_SIZE (optimisé)"
          echo "  APK size : $APK_SIZE (optimisé)"

      # ── 17. WEBHOOK — Notifier Railway ─────────────────────────────────────
      - name: Notify Railway webhook
        if: always()
        run: |
          echo "🔔 Envoi webhook à Railway..."

          JOB_STATUS=${{ job.status }}
          RUN_CONCLUSION=${{ job.conclusion }}

          if [ "$JOB_STATUS" = "success" ]; then
            WEBHOOK_STATUS="completed"
          else
            WEBHOOK_STATUS="failure"
          fi

          echo "  Job Status: $JOB_STATUS"
          echo "  Run Conclusion: $RUN_CONCLUSION"
          echo "  Webhook Status: $WEBHOOK_STATUS"

          curl -X POST "https://test-automation-rskn-production.up.railway.app/api/webhook/github" \
            -H "Content-Type: application/json" \
            -d "{
              \"action\": \"workflow_run\",
              \"workflow_run\": {
                \"id\": ${{ github.run_id }},
                \"name\": \"${{ github.workflow }}\",
                \"status\": \"completed\",
                \"conclusion\": \"$RUN_CONCLUSION\",
                \"html_url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }
            }" \
            -v || echo "⚠️  Webhook failed (Railway may be unreachable)"

          echo "✅ Webhook envoyé"
