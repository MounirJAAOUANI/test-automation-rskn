name: Build Flutter

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Nom de l'application (ex: SpendSense)"
        required: true
        type: string
      package_id:
        description: "Package ID complet (ex: com.yourname.spendsense)"
        required: true
        type: string
      primary_color:
        description: "Couleur hex SANS le # (ex: 7C3AED)"
        required: false
        type: string
        default: "7C3AED"

jobs:
  build:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Java 17 (requis Flutter 3.22+) ────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter stable ────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"
          cache: true

      # ── 4. Générer un projet Flutter propre avec v2 embedding ────────────
      #    On génère dans /tmp, puis on copie les fichiers Android/iOS dans le repo.
      #    Cela garantit que TOUS les fichiers Android v2 sont présents et corrects.
      - name: Generate clean Flutter project (v2 embedding)
        run: |
          # Calcule le dart_name : lettres minuscules + chiffres + underscore uniquement
          DART_NAME=$(echo "${{ inputs.app_name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr ' ' '_' \
            | sed 's/[^a-z0-9_]//g')
          echo "DART_NAME=$DART_NAME" >> $GITHUB_ENV

          # Extrait org et appname depuis le package_id
          # ex: com.yourname.spendsense → org=com.yourname, appname=spendsense
          PACKAGE_ORG=$(echo "${{ inputs.package_id }}" | rev | cut -d'.' -f2- | rev)
          PACKAGE_APP=$(echo "${{ inputs.package_id }}" | rev | cut -d'.' -f1 | rev)
          echo "PACKAGE_ORG=$PACKAGE_ORG"  >> $GITHUB_ENV
          echo "PACKAGE_APP=$PACKAGE_APP"  >> $GITHUB_ENV

          echo "▶ Generating Flutter project..."
          flutter create \
            --org "$PACKAGE_ORG" \
            --project-name "$DART_NAME" \
            --platforms android \
            /tmp/flutter_gen

          echo "✅ Flutter project generated:"
          ls /tmp/flutter_gen

      # ── 5. Copier les fichiers Android générés dans le repo ──────────────
      - name: Copy generated Android files into repo
        run: |
          echo "▶ Copying Android platform files..."
          rm -rf android
          cp -r /tmp/flutter_gen/android ./android
          echo "✅ Android files copied"
          echo "--- android/app/build.gradle ---"
          cat android/app/build.gradle

      # ── 6. Injecter le pubspec.yaml avec le bon nom et package ───────────
      - name: Inject pubspec.yaml
        run: |
          cat > pubspec.yaml << EOF
          name: ${DART_NAME}
          description: ${{ inputs.app_name }} — Built with App Factory
          version: 1.0.0+1
          publish_to: 'none'

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            cupertino_icons: ^1.0.8
            shared_preferences: ^2.2.3

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0

          flutter:
            uses-material-design: true
          EOF

          echo "✅ pubspec.yaml injected:"
          cat pubspec.yaml

      # ── 7. Injecter lib/main.dart avec les vraies valeurs ────────────────
      - name: Inject lib/main.dart
        run: |
          # Convertit la couleur hex en int Dart (0xFF + hex sans #)
          COLOR_INT="0xFF${{ inputs.primary_color }}"

          mkdir -p lib

          cat > lib/main.dart << DARTEOF
          import 'package:flutter/material.dart';

          void main() {
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ inputs.app_name }}',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(
                    seedColor: const Color($COLOR_INT),
                  ),
                  useMaterial3: true,
                ),
                home: const HomePage(),
              );
            }
          }

          class HomePage extends StatelessWidget {
            const HomePage({super.key});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('${{ inputs.app_name }}'),
                  backgroundColor: const Color($COLOR_INT),
                  foregroundColor: Colors.white,
                ),
                body: const Center(
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      Icon(Icons.rocket_launch, size: 64, color: Color($COLOR_INT)),
                      SizedBox(height: 16),
                      Text(
                        '${{ inputs.app_name }}',
                        style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold),
                      ),
                      SizedBox(height: 8),
                      Text('Built with App Factory'),
                    ],
                  ),
                ),
              );
            }
          }
          DARTEOF

          echo "✅ lib/main.dart injected"
          head -20 lib/main.dart

      # ── 8. Vérification des fichiers ─────────────────────────────────────
      - name: Verify project structure
        run: |
          echo "=== Project root ==="
          ls -la
          echo "=== lib/ ==="
          ls -la lib/
          echo "=== android/app/ ==="
          ls -la android/app/
          echo "=== android/app/build.gradle ==="
          cat android/app/build.gradle
          echo "=== pubspec.yaml ==="
          cat pubspec.yaml

      # ── 9. flutter pub get ────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── 10. Build AAB release ─────────────────────────────────────────────
      - name: Flutter build appbundle
        run: flutter build appbundle --release

      # ── 11. Build APK debug (pour test téléphone) ─────────────────────────
      - name: Flutter build APK debug
        run: flutter build apk --debug

      # ── 12. Upload AAB ────────────────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 13. Upload APK debug ──────────────────────────────────────────────
      - name: Upload APK debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # ── 14. Résumé final ──────────────────────────────────────────────────
      - name: Build summary
        run: |
          AAB_SIZE=$(du -sh build/app/outputs/bundle/release/app-release.aab 2>/dev/null | cut -f1 || echo "N/A")
          APK_SIZE=$(du -sh build/app/outputs/flutter-apk/app-debug.apk 2>/dev/null | cut -f1 || echo "N/A")
          echo "✅ Build terminé avec succès"
          echo "  App name  : ${{ inputs.app_name }}"
          echo "  Package   : ${{ inputs.package_id }}"
          echo "  Dart name : $DART_NAME"
          echo "  Color     : #${{ inputs.primary_color }}"
          echo "  AAB size  : $AAB_SIZE"
          echo "  APK size  : $APK_SIZE"
